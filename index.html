<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Graph Master: Distance & Velocity</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f0f4f8;
            --primary: #4361ee;
            --primary-hover: #3a53d0;
            --secondary: #f72585;
            --success: #10b981;
            --success-dark: #059669;
            --warning: #f8961e;
            --danger: #ef4444;
            --dark: #2b2d42;
            --light: #ffffff;
            --grid-line: #e2e8f0;
            --font-main: 'Nunito', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: var(--font-main); }
        
        body { background-color: var(--bg-color); color: var(--dark); line-height: 1.6; }

        .container { max-width: 1000px; margin: 0 auto; padding: 20px; }

        header { text-align: center; margin-bottom: 30px; }
        header h1 { font-size: 3rem; color: var(--primary); font-weight: 900; text-transform: uppercase; letter-spacing: 2px; text-shadow: 2px 2px 0px rgba(0,0,0,0.1); }
        header p { font-size: 1.2rem; font-weight: 600; color: #555; }

        .card { background: var(--light); border-radius: 20px; padding: 30px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); margin-bottom: 20px; border: 3px solid transparent; transition: 0.3s; }
        
        .btn { display: inline-block; padding: 12px 25px; font-size: 1.1rem; font-weight: 800; color: white; background: var(--primary); border: none; border-radius: 12px; cursor: pointer; transition: 0.2s; box-shadow: 0 5px 0 var(--primary-hover); text-transform: uppercase; margin: 5px; }
        .btn:active { transform: translateY(5px); box-shadow: none; }
        .btn-secondary { background: var(--warning); box-shadow: 0 5px 0 #d97a14; }
        .btn-success { background: var(--success); box-shadow: 0 5px 0 var(--success-dark); }
        
        .hidden { display: none !important; }

        /* Menu Styles */
        .menu-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-top: 20px; }
        .topic-btn { padding: 20px; font-size: 1.2rem; background: white; color: var(--primary); border: 3px solid var(--primary); border-radius: 15px; cursor: pointer; font-weight: 800; transition: 0.3s; }
        .topic-btn:hover { background: var(--primary); color: white; transform: scale(1.05); }

        /* Layout for Questions */
        .question-layout { display: flex; flex-wrap: wrap; gap: 20px; }
        .graph-panel { flex: 1; min-width: 350px; text-align: center; }
        .interactive-panel { flex: 1; min-width: 350px; display: flex; flex-direction: column; justify-content: center; }
        
        canvas { background: white; border: 3px solid #cbd5e1; border-radius: 10px; cursor: crosshair; touch-action: none; max-width: 100%; height: auto; box-shadow: inset 0 0 10px rgba(0,0,0,0.02); }

        /* Statement Styles */
        .statement-card { background: #f8fafc; border: 2px solid #e2e8f0; padding: 15px; border-radius: 10px; margin-bottom: 15px; }
        .statement-card h4 { margin-bottom: 10px; font-size: 1.1rem; }
        .toggle-group { display: flex; gap: 10px; flex-wrap: wrap; }
        .toggle-btn { flex: 1; padding: 8px; border: 2px solid #cbd5e1; background: white; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; min-width: 80px; }
        .toggle-btn.selected-true { background: var(--success); color: white; border-color: var(--success-dark); }
        .toggle-btn.selected-false { background: var(--danger); color: white; border-color: #b91c1c; }
        .toggle-btn.selected-mcq { background: var(--primary); color: white; border-color: var(--primary-hover); }
        .toggle-btn.locked { pointer-events: none; opacity: 0.6; }

        .explanation { background: #e0f2fe; padding: 10px; border-radius: 8px; margin-top: 10px; font-size: 0.95rem; font-weight: 600; color: #0269a4; border-left: 5px solid #0284c7; }

        /* Graph Tools */
        .toolbar { display: flex; gap: 10px; justify-content: center; margin-top: 15px; }
        .scenario-text { font-size: 1.2rem; font-weight: 600; margin-bottom: 20px; background: #fffbeb; padding: 20px; border-radius: 15px; border-left: 6px solid var(--warning); }
        .scenario-text ul { padding-left: 20px; margin-top: 10px; }

        /* Feedback */
        .feedback { font-size: 1.2rem; font-weight: 800; padding: 15px; border-radius: 10px; margin-top: 20px; text-align: center; }
        .feedback.success { background: #d1fae5; color: #065f46; border: 2px solid #34d399; }
        .feedback.error { background: #fef2f2; color: #991b1b; border: 2px solid #f87171; }

        /* Test specific */
        .test-input { padding: 12px; font-size: 1.2rem; border: 3px solid #cbd5e1; border-radius: 10px; width: 100%; max-width: 300px; margin-bottom: 15px; font-family: var(--font-main); }
        .test-question-container { border-bottom: 4px dashed #cbd5e1; padding-bottom: 40px; margin-bottom: 40px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; }
        th, td { padding: 15px; border: 1px solid #e2e8f0; text-align: left; }
        th { background: #f1f5f9; font-weight: 800; }
        .score-display { font-size: 2.5rem; font-weight: 900; color: var(--primary); text-align: center; margin: 20px 0; }
        
        /* Context Box */
        .context-box { background: #e0f2fe; color: #0269a4; padding: 12px 20px; border-radius: 10px; margin-bottom: 20px; font-weight: 600; border-left: 5px solid #0284c7; font-size: 1.05rem;}
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>🚀 Graph Master 📈</h1>
        <p>Master Distance-Time & Velocity-Time Graphs!</p>
    </header>

    <div id="main-menu" class="card" style="text-align: center;">
        <h2>Select a Mode</h2>
        <div style="margin-top: 20px;">
            <button class="btn" onclick="app.showPracticeMenu()">Practice Mode</button>
            <button class="btn btn-secondary" onclick="app.showTestLogin()">Test Mode</button>
        </div>
    </div>

    <div id="practice-menu" class="card hidden">
        <h2>🏋️ Practice Menu</h2>
        <p>Choose a topic to practice. You get instant feedback and multiple tries!</p>
        <div class="menu-grid">
            <button class="topic-btn" onclick="app.startPractice(1)">🔍 Interpret Distance-Time</button>
            <button class="topic-btn" onclick="app.startPractice(2)">🔍 Interpret Velocity-Time</button>
            <button class="topic-btn" onclick="app.startPractice(3)">✏️ Create Distance-Time</button>
            <button class="topic-btn" onclick="app.startPractice(4)">✏️ Create Velocity-Time</button>
        </div>
        <button class="btn btn-secondary" style="margin-top: 20px;" onclick="app.showMainMenu()">⬅️ Back</button>
    </div>

    <div id="test-login" class="card hidden" style="text-align: center;">
        <h2>📝 Test Mode</h2>
        <p>Complete 4 problems (1 from each topic). Total 16 points. Good luck!</p>
        <br>
        <input type="text" id="student-name" class="test-input" placeholder="Enter your name..."><br>
        <button class="btn btn-success" onclick="app.startTest()">Start Test 🚀</button>
        <button class="btn btn-secondary" onclick="app.showMainMenu()">⬅️ Back</button>
    </div>

    <div id="workspace" class="hidden">
        <h2 id="workspace-title" style="margin-bottom: 20px; color: var(--primary);"></h2>
        <div id="questions-container"></div>
        
        <div id="practice-controls" class="card" style="text-align: center; background: transparent; border: none; box-shadow: none;">
            <div id="practice-feedback" class="feedback hidden"></div>
            <button id="btn-check" class="btn btn-success" onclick="app.checkPractice()">Check Answer ✅</button>
            <button id="btn-next" class="btn hidden" onclick="app.startPractice(app.currentTopic)">Try Another 🔄</button>
            <button class="btn btn-secondary" onclick="app.showPracticeMenu()">⬅️ Exit Practice</button>
        </div>

        <div id="test-controls" class="card hidden" style="text-align: center; background: transparent; border: none; box-shadow: none;">
            <button class="btn btn-success" onclick="app.submitTest()">Submit Test & Review 📝</button>
        </div>
    </div>

    <div id="test-results" class="hidden">
        <div class="card">
            <h2 style="text-align: center;">🎉 Test Complete, <span id="res-name"></span>!</h2>
            <div class="score-display">Total Score: <span id="res-score"></span> / 16</div>
            <div id="results-summary-container"></div>
            <div style="text-align: center; margin-top: 20px;">
                <button class="btn" onclick="app.showMainMenu()">🏠 Return Home</button>
            </div>
        </div>
        <div id="results-detailed-container"></div>
        <div style="text-align: center; margin-top: 30px; margin-bottom: 50px;">
            <button class="btn btn-secondary" onclick="window.scrollTo(0,0)">⬆️ Back to Top</button>
            <button class="btn" onclick="app.showMainMenu()">🏠 Return Home</button>
        </div>
    </div>
</div>

<script>
// --- UTILITIES ---
const randInt = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;
const pickRandom = (arr) => arr[Math.floor(Math.random() * arr.length)];
const NAMES =["Erika", "Riven", "Elaine", "Sir Wilson", "Kendall", "Kim", "Khloé", "Kourtney", "Taylor", "Ariana", "Sabrina", "Olivia", "Marco", "Luis", "Leo", "Maya"];
const DIRECTIONS = [['forward', 'backward'], ['north', 'south'], ['east', 'west'],['upward', 'downward']];

// Generates unique numerical options for Multiple Choice
const genUniqueOptions = (correctVal, count = 3, unit = '') => {
    let opts = [correctVal];
    while (opts.length < count) {
        let variance = unit.includes('m/s²') ? randInt(1, 3) : randInt(1, 5); // Smaller variance for acceleration
        let fake = correctVal + variance * (Math.random() > 0.5 ? 1 : -1);
        if (fake < 0 && (unit === 'm' || unit === 'm/s')) fake = Math.abs(fake); // Speeds and distances stay positive in these answers
        if (!opts.includes(fake)) opts.push(fake);
    }
    opts.sort(() => Math.random() - 0.5);
    return {
        options: opts.map(o => o + (unit ? ' ' + unit : '')),
        correctIndex: opts.indexOf(correctVal)
    };
};

function generateGraphPath(isVelocity) {
    let path = [{ t: 0, y: 0 }];
    let t = 0, y = 0;
    
    let dts =[];
    let rem = 12;
    for (let i = 0; i < 3; i++) {
        let maxDt = rem - (3 - i) * 2; 
        let dt = randInt(2, maxDt);
        dts.push(dt);
        rem -= dt;
    }
    dts.push(rem); 

    // 50% chance to force at least one horizontal line segment
    let forceFlatIdx = Math.random() < 0.5 ? randInt(0, 3) : -1;

    for (let i = 0; i < 4; i++) {
        let dt = dts[i];
        let validRates =[];
        
        for (let r = -4; r <= 4; r++) {
            let newY = y + r * dt;
            if (newY >= 0 && newY <= 12) validRates.push(r);
        }

        if (i === forceFlatIdx && validRates.includes(0)) {
            validRates =[0]; // Force the horizontal line here
        } else {
            if (isVelocity && i === 2 && forceFlatIdx !== 2) {
                let guided = validRates.filter(r => (y + r * dt) % dts[3] === 0);
                if (guided.length > 0) validRates = guided;
            }
            if (isVelocity && i === 3 && forceFlatIdx !== 3) {
                let r0 = -y / dt;
                if (Number.isInteger(r0) && validRates.includes(r0)) {
                    if (Math.random() < 0.8) validRates = [r0]; 
                }
            }
            if (validRates.length > 1 && Math.random() < 0.6 && i !== forceFlatIdx) {
                validRates = validRates.filter(r => r !== 0); // lessen accidental flatlines
            }
        }
        
        let rate = validRates.length > 0 ? pickRandom(validRates) : 0;
        y += rate * dt;
        t += dt;
        path.push({ t, y });
    }
    return path;
}

// --- GENERATORS ---
const ContentGen = {
    generateInterpret(topicId) {
        const isVel = topicId === 2;
        const path = generateGraphPath(isVel);
        const statements =[];
        let dirPair = pickRandom(DIRECTIONS);
        let context = `Consider an object moving in one dimension (${dirPair[0]}-${dirPair[1]}). Assume moving <strong>${dirPair[0]}</strong> is the positive direction.`;
        
        // Find flat segments to potentially force a contextual T/F question
        let flatSegments =[];
        for (let i = 0; i < 4; i++) {
            if (path[i].y === path[i+1].y) flatSegments.push(i);
        }

        let forceFlatTF = flatSegments.length > 0 && Math.random() < 0.5;
        let flatSegmentTarget = forceFlatTF ? pickRandom(flatSegments) : -1;

        // Ensure exactly 2 TF and 2 MCQ
        let questionTypes = ['TF', 'TF', 'MCQ', 'MCQ'];
        
        if (forceFlatTF) {
            questionTypes.splice(questionTypes.indexOf('TF'), 1); // Extract one TF
        }
        questionTypes.sort(() => Math.random() - 0.5); // Shuffle remaining
        if (forceFlatTF) {
            questionTypes.splice(flatSegmentTarget, 0, 'TF'); // Force TF at the flat segment index
        }

        // Question Pools to prevent repeating formats
        let dt_tf_pool = ['speed_dist', 'rest_moving', 'position'];
        let dt_mcq_pool = ['speed', 'dist_origin', 'dist_travelled'];
        let vt_tf_pool = ['acceleration', 'speed_change', 'maintained', 'start_stop'];
        let vt_mcq_pool = ['velocity_at', 'acceleration'];

        for (let i = 0; i < 4; i++) {
            let p1 = path[i];
            let p2 = path[i+1];
            let dt = p2.t - p1.t;
            let dy = p2.y - p1.y;
            let rate = dy / dt; 
            
            let qType = questionTypes[i];
            let stmt = { type: qType, exp: '' };
            let isTrue = Math.random() > 0.5;

            if (!isVel) { // DISTANCE-TIME
                if (qType === 'TF') {
                    let actualDist = Math.abs(dy);
                    let actualDir = dy >= 0 ? dirPair[0] : dirPair[1];
                    let selectedType;

                    if (forceFlatTF && i === flatSegmentTarget) {
                        selectedType = 'rest_moving';
                    } else {
                        let available = dt_tf_pool.filter(t => t !== 'rest_moving' || rate === 0);
                        if (available.length === 0) available = dt_tf_pool; 
                        selectedType = pickRandom(available);
                    }
                    dt_tf_pool = dt_tf_pool.filter(t => t !== selectedType);
                    stmt.isTrue = isTrue;

                    if (selectedType === 'speed_dist') {
                        if (Math.random() > 0.5) { 
                            let actualSpeed = Math.abs(rate);
                            let statedSpeed = isTrue ? actualSpeed : actualSpeed + randInt(1,3);
                            stmt.text = `TRUE OR FALSE. The object travels at a speed of ${statedSpeed} m/s from t=${p1.t}s to t=${p2.t}s.`;
                            stmt.exp = `Speed is distance / time: |${p2.y} - ${p1.y}| / ${dt} = ${actualSpeed} m/s.`;
                        } else { 
                            let statedDist = isTrue ? actualDist : actualDist + randInt(2, 6);
                            let statedDir = isTrue ? actualDir : (Math.random() > 0.5 ? actualDir : (dy >= 0 ? dirPair[1] : dirPair[0]));
                            if (!isTrue && statedDist === actualDist && statedDir === actualDir) statedDist += 2;
                            stmt.isTrue = (statedDist === actualDist && statedDir === actualDir);
                            
                            if (actualDist === 0) {
                                if (stmt.isTrue) {
                                    stmt.text = `TRUE OR FALSE. The object travels 0 m from t=${p1.t}s to t=${p2.t}s.`;
                                    stmt.exp = `The object stayed still at ${p1.y} m.`;
                                } else {
                                    stmt.text = `TRUE OR FALSE. The object travels ${randInt(2,6)} m from t=${p1.t}s to t=${p2.t}s.`;
                                    stmt.exp = `False, the object stayed still at ${p1.y} m.`;
                                }
                            } else {
                                stmt.text = `TRUE OR FALSE. The object travelled for ${statedDist} m ${statedDir} from t=${p1.t}s to t=${p2.t}s.`;
                                stmt.exp = `It moved from ${p1.y}m to ${p2.y}m, completing a distance of ${actualDist}m ${actualDir}.`;
                            }
                        }
                    } else if (selectedType === 'rest_moving') {
                        let actualRest = (rate === 0);
                        if (isTrue) {
                            stmt.text = `TRUE OR FALSE. The object is ${actualRest ? 'at rest' : 'moving'} from t=${p1.t}s to t=${p2.t}s.`;
                            stmt.exp = actualRest ? `The distance does not change.` : `The distance changes from ${p1.y}m to ${p2.y}m.`;
                        } else {
                            stmt.text = `TRUE OR FALSE. The object is ${actualRest ? 'moving' : 'at rest'} from t=${p1.t}s to t=${p2.t}s.`;
                            stmt.exp = actualRest ? `Actually, it is at rest.` : `Actually, the distance is changing.`;
                        }
                    } else { // position
                        let actualY = p2.y;
                        let fakeY = actualY + randInt(1, 4) * (Math.random() > 0.5 ? 1 : -1);
                        if (fakeY < 0) fakeY = actualY + randInt(1, 3);
                        stmt.text = `TRUE OR FALSE. At t=${p2.t}s, the object's distance from its starting position is ${isTrue ? actualY : fakeY} m.`;
                        stmt.exp = `Looking at the graph at t=${p2.t}s, the distance reads ${actualY} m.`;
                    }

                } else { // MCQ DISTANCE-TIME
                    let selectedType = pickRandom(dt_mcq_pool);
                    dt_mcq_pool = dt_mcq_pool.filter(t => t !== selectedType);
                    let actualSpeed = Math.abs(rate);
                    
                    if (selectedType === 'speed') {
                        stmt.text = `What is the speed of the object from t=${p1.t}s to t=${p2.t}s?`;
                        let res = genUniqueOptions(actualSpeed, 3, 'm/s');
                        stmt.options = res.options; stmt.correctIndex = res.correctIndex;
                        stmt.exp = `Speed is calculated as distance/time: |${p2.y} - ${p1.y}| / ${dt} = ${actualSpeed} m/s.`;
                    } else if (selectedType === 'dist_origin') {
                        stmt.text = `What is the distance of the object from its starting position at t=${p2.t}s?`;
                        let res = genUniqueOptions(p2.y, 3, 'm');
                        stmt.options = res.options; stmt.correctIndex = res.correctIndex;
                        stmt.exp = `Looking at the y-axis at t=${p2.t}s, the distance is ${p2.y} m.`;
                    } else { // dist_travelled
                        let dist = Math.abs(dy);
                        stmt.text = `What is the distance travelled by the object from t=${p1.t}s to t=${p2.t}s?`;
                        let res = genUniqueOptions(dist, 3, 'm');
                        stmt.options = res.options; stmt.correctIndex = res.correctIndex;
                        stmt.exp = `The object moved from ${p1.y}m to ${p2.y}m, which is a distance of ${dist} m.`;
                    }
                }
            } else { // VELOCITY-TIME
                if (qType === 'TF') {
                    let selectedType;
                    if (forceFlatTF && i === flatSegmentTarget) {
                        selectedType = 'maintained';
                    } else {
                        let available = vt_tf_pool.filter(t => t !== 'maintained' || rate === 0);
                        if (available.length === 0) available = vt_tf_pool; 
                        selectedType = pickRandom(available);
                    }
                    vt_tf_pool = vt_tf_pool.filter(t => t !== selectedType);
                    stmt.isTrue = isTrue;

                    if (selectedType === 'acceleration') {
                        let fakeAcc = rate + randInt(1, 3) * (Math.random() > 0.5 ? 1 : -1);
                        if (fakeAcc === rate) fakeAcc += 1;
                        stmt.text = `TRUE OR FALSE. The acceleration is ${isTrue ? rate : fakeAcc} m/s² from t=${p1.t}s to t=${p2.t}s.`;
                        stmt.exp = `Acceleration is the slope: (${p2.y} - ${p1.y}) / ${dt} = ${rate} m/s².`;
                    } else if (selectedType === 'speed_change') {
                        let fakeY = p2.y + randInt(1, 3) * (Math.random() > 0.5 ? 1 : -1);
                        if (fakeY === p2.y) fakeY += 1;
                        if (p1.y === p2.y && isTrue) {
                            stmt.text = `TRUE OR FALSE. From t=${p1.t}s to t=${p2.t}s, the object maintained a speed of ${p1.y} m/s.`;
                        } else {
                            stmt.text = `TRUE OR FALSE. From t=${p1.t}s to t=${p2.t}s, the object's speed changed from ${p1.y} m/s to ${isTrue ? p2.y : fakeY} m/s.`;
                        }
                        stmt.exp = `At t=${p1.t}s speed is ${p1.y} m/s, and at t=${p2.t}s it is ${p2.y} m/s.`;
                    } else if (selectedType === 'maintained') {
                        let actualConst = (rate === 0);
                        if (isTrue) {
                            stmt.text = `TRUE OR FALSE. The object ${actualConst ? 'maintained its speed' : "changed its speed"} from t=${p1.t}s to t=${p2.t}s.`;
                            stmt.exp = actualConst ? `The velocity stays flat.` : `The velocity is changing.`;
                        } else {
                            stmt.text = `TRUE OR FALSE. The object ${actualConst ? "changed its speed" : 'maintained its speed'} from t=${p1.t}s to t=${p2.t}s.`;
                            stmt.exp = actualConst ? `False, it stays flat at ${p1.y} m/s.` : `False, velocity changes from ${p1.y} to ${p2.y} m/s.`;
                        }
                    } else { // start_stop
                        if (p1.y === 0 || p2.y === 0) {
                            let isStart = (p1.y === 0);
                            if (isStart) {
                                stmt.text = `TRUE OR FALSE. The object started from rest at t=${p1.t}s.`;
                                stmt.isTrue = true;
                                stmt.exp = `At t=${p1.t}s, velocity is 0 m/s.`;
                            } else {
                                stmt.text = `TRUE OR FALSE. The object came to a stop at t=${p2.t}s.`;
                                stmt.isTrue = true;
                                stmt.exp = `At t=${p2.t}s, velocity drops to 0 m/s.`;
                            }
                            if (!isTrue) {
                                stmt.isTrue = false;
                                if (isStart) {
                                    let fakeV = randInt(1, 4);
                                    stmt.text = `TRUE OR FALSE. The object had a velocity of ${fakeV} m/s at t=${p1.t}s.`;
                                    stmt.exp = `False, it started from rest (0 m/s).`;
                                } else {
                                    let fakeV = randInt(1, 4);
                                    stmt.text = `TRUE OR FALSE. At t=${p2.t}s, the object's velocity is ${fakeV} m/s.`;
                                    stmt.exp = `False, it came to a stop (0 m/s).`;
                                }
                            }
                        } else {
                            let fakeY = p2.y + randInt(1,3);
                            stmt.text = `TRUE OR FALSE. At t=${p2.t}s, the object's velocity is ${isTrue ? p2.y : fakeY} m/s.`;
                            stmt.exp = `Looking at the graph at t=${p2.t}s, velocity reads ${p2.y} m/s.`;
                        }
                    }
                } else { // MCQ VELOCITY-TIME
                    let selectedType = pickRandom(vt_mcq_pool);
                    vt_mcq_pool = vt_mcq_pool.filter(t => t !== selectedType);
                    if (!selectedType) selectedType = 'velocity_at'; 
                    
                    if (selectedType === 'velocity_at') {
                        stmt.text = `What is the velocity of the object at t=${p2.t}s?`;
                        let res = genUniqueOptions(p2.y, 3, 'm/s');
                        stmt.options = res.options; stmt.correctIndex = res.correctIndex;
                        stmt.exp = `Reading the y-axis at t=${p2.t}s gives ${p2.y} m/s.`;
                    } else if (selectedType === 'acceleration') {
                        stmt.text = `What is the acceleration from t=${p1.t}s to t=${p2.t}s?`;
                        let res = genUniqueOptions(rate, 3, 'm/s²');
                        stmt.options = res.options; stmt.correctIndex = res.correctIndex;
                        stmt.exp = `Acceleration is calculated as slope: (${p2.y} - ${p1.y}) / ${dt} = ${rate} m/s².`;
                    }
                }
            }
            statements.push(stmt);
        }
        
        return { type: 'interpret', isVel, path, statements, context };
    },

    generateCreate(topicId) {
        const isVel = topicId === 4;
        const path = generateGraphPath(isVel);
        const name = pickRandom(NAMES);
        let scenario = `<strong>${name}</strong> is performing an experiment. Here is the data log:<ul>`;
        let dirPair = pickRandom(DIRECTIONS);
        
        for(let i = 0; i < path.length - 1; i++) {
            let p1 = path[i];
            let p2 = path[i+1];
            let dt = p2.t - p1.t;
            let dy = p2.y - p1.y;
            let rate = dy / dt;
            let dist = Math.abs(dy);

            if (!isVel) {
                let useSpeed = Math.random() > 0.5; 
                if (rate > 0) {
                    if (useSpeed) scenario += `<li>Walks ${dirPair[0]} at ${rate} m/s for ${dt} seconds.</li>`;
                    else scenario += `<li>Walks ${dist} m ${dirPair[0]} in ${dt} seconds.</li>`;
                } else if (rate < 0) {
                    if (useSpeed) scenario += `<li>Walks ${dirPair[1]} at ${Math.abs(rate)} m/s for ${dt} seconds.</li>`;
                    else scenario += `<li>Walks ${dist} m ${dirPair[1]} in ${dt} seconds.</li>`;
                } else {
                    scenario += `<li>Stands still for ${dt} seconds.</li>`;
                }
            } else {
                if (rate > 0) {
                    if (p1.y === 0) scenario += `<li>From rest, accelerates steadily to ${p2.y} m/s in ${dt} seconds.</li>`;
                    else scenario += `<li>Accelerates steadily from ${p1.y} m/s to ${p2.y} m/s in ${dt} seconds.</li>`;
                } else if (rate < 0) {
                    if (p2.y === 0 && i === path.length - 2) {
                        scenario += `<li>Slowed down steadily until the destination is reached in ${dt} seconds.</li>`;
                    } else {
                        scenario += `<li>Slows down steadily to ${p2.y} m/s in ${dt} seconds.</li>`;
                    }
                } else {
                    if (p1.y === 0) scenario += `<li>Remains at rest for ${dt} seconds.</li>`;
                    else scenario += `<li>Maintained this speed for ${dt} seconds.</li>`;
                }
            }
        }
        scenario += "</ul>";
        
        return { type: 'create', isVel, path, scenario };
    }
};

// --- CANVAS MANAGER ---
class GraphCanvas {
    constructor(containerId, isVel, readOnly, targetPath = null) {
        this.container = document.getElementById(containerId);
        this.canvas = document.createElement('canvas');
        this.canvas.width = 400;
        this.canvas.height = 350;
        this.ctx = this.canvas.getContext('2d');
        this.container.appendChild(this.canvas);
        
        this.isVel = isVel;
        this.readOnly = readOnly;
        this.targetPath = targetPath;
        this.reviewMode = false;
        
        this.gridMaxX = 12;
        this.gridMaxY = 12;
        this.margin = { left: 45, bottom: 40, top: 20, right: 20 };
        this.plotW = this.canvas.width - this.margin.left - this.margin.right;
        this.plotH = this.canvas.height - this.margin.top - this.margin.bottom;
        
        this.userSegments =[];
        this.draggingNode = null;
        this.showAnswer = false;

        if (!readOnly) this.initEvents();
        this.draw();
    }

    setUserSegments(segs) {
        this.userSegments = JSON.parse(JSON.stringify(segs)); 
    }

    addSegment() {
        if(this.readOnly) return;
        if(this.userSegments.length >= 4) return alert("Maximum 4 segments allowed!");
        let startT = 0, startY = 0;
        if (this.userSegments.length > 0) {
            let lastSeg = this.userSegments[this.userSegments.length - 1];
            startT = lastSeg.t2; startY = lastSeg.y2;
        }
        let endT = Math.min(startT + 2, this.gridMaxX);
        let endY = startY;
        this.userSegments.push({ t1: startT, y1: startY, t2: endT, y2: endY });
        this.draw();
    }

    removeSegment() {
        if(this.readOnly) return;
        this.userSegments.pop();
        this.draw();
    }

    toScreen(t, y) {
        let px = this.margin.left + (t / this.gridMaxX) * this.plotW;
        let py = this.margin.top + this.plotH - (y / this.gridMaxY) * this.plotH;
        return {x: px, y: py};
    }

    toLogical(px, py) {
        let t = Math.round(((px - this.margin.left) / this.plotW) * this.gridMaxX);
        let y = Math.round(((this.margin.top + this.plotH - py) / this.plotH) * this.gridMaxY);
        t = Math.max(0, Math.min(this.gridMaxX, t));
        y = Math.max(0, Math.min(this.gridMaxY, y));
        return {t, y};
    }

    initEvents() {
        let isDown = false;
        const getPos = (e) => {
            let rect = this.canvas.getBoundingClientRect();
            let evt = (e.touches && e.touches.length > 0) ? e.touches[0] : e;
            return { x: evt.clientX - rect.left, y: evt.clientY - rect.top };
        };

        const down = (e) => {
            if (this.readOnly) return; 
            isDown = true;
            let pos = getPos(e);
            this.draggingNode = null;
            for(let i=0; i<this.userSegments.length; i++) {
                let s = this.userSegments[i];
                let p1 = this.toScreen(s.t1, s.y1);
                let p2 = this.toScreen(s.t2, s.y2);
                if (Math.hypot(pos.x - p1.x, pos.y - p1.y) < 20) { this.draggingNode = {idx: i, point: 1}; break; }
                if (Math.hypot(pos.x - p2.x, pos.y - p2.y) < 20) { this.draggingNode = {idx: i, point: 2}; break; }
            }
        };

        const move = (e) => {
            if (!isDown || !this.draggingNode || this.readOnly) return;
            e.preventDefault();
            let pos = getPos(e);
            let logical = this.toLogical(pos.x, pos.y);
            let s = this.userSegments[this.draggingNode.idx];
            if (this.draggingNode.point === 1) { s.t1 = logical.t; s.y1 = logical.y; }
            else { s.t2 = logical.t; s.y2 = logical.y; }
            this.draw();
        };

        const up = () => { isDown = false; this.draggingNode = null; };

        this.canvas.addEventListener('mousedown', down);
        this.canvas.addEventListener('mousemove', move);
        this.canvas.addEventListener('mouseup', up);
        this.canvas.addEventListener('mouseleave', up);
        this.canvas.addEventListener('touchstart', down, {passive: false});
        this.canvas.addEventListener('touchmove', move, {passive: false});
        this.canvas.addEventListener('touchend', up);
    }

    draw() {
        const ctx = this.ctx;
        ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
        
        ctx.strokeStyle = '#e2e8f0'; ctx.lineWidth = 1;
        ctx.beginPath();
        for(let i=0; i<=this.gridMaxX; i+=2) {
            let x = this.toScreen(i, 0).x;
            ctx.moveTo(x, this.margin.top); ctx.lineTo(x, this.margin.top + this.plotH);
        }
        for(let i=0; i<=this.gridMaxY; i+=2) {
            let y = this.toScreen(0, i).y;
            ctx.moveTo(this.margin.left, y); ctx.lineTo(this.margin.left + this.plotW, y);
        }
        ctx.stroke();

        ctx.strokeStyle = '#2b2d42'; ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(this.margin.left, this.margin.top);
        ctx.lineTo(this.margin.left, this.margin.top + this.plotH);
        ctx.lineTo(this.margin.left + this.plotW, this.margin.top + this.plotH);
        ctx.stroke();

        ctx.fillStyle = '#2b2d42'; ctx.font = '12px Nunito'; ctx.textAlign = 'center';
        for(let i=0; i<=this.gridMaxX; i+=2) {
            ctx.fillText(i, this.toScreen(i, 0).x, this.canvas.height - 10);
        }
        ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
        for(let i=0; i<=this.gridMaxY; i+=2) {
            ctx.fillText(i, this.margin.left - 5, this.toScreen(0, i).y);
        }
        
        ctx.textAlign = 'center';
        ctx.fillText("Time (s)", this.canvas.width/2, this.canvas.height - 2);
        ctx.save();
        ctx.translate(12, this.canvas.height/2);
        ctx.rotate(-Math.PI/2);
        ctx.fillText(this.isVel ? "Velocity (m/s)" : "Distance (m)", 0, 0);
        ctx.restore();

        // Target Graph
        if (this.targetPath && (this.readOnly || this.showAnswer)) {
            ctx.strokeStyle = this.showAnswer ? '#10b981' : '#4361ee'; 
            ctx.lineWidth = this.showAnswer ? 8 : 4;
            ctx.beginPath();
            let start = this.toScreen(this.targetPath[0].t, this.targetPath[0].y);
            ctx.moveTo(start.x, start.y);
            for(let i=1; i<this.targetPath.length; i++) {
                let p = this.toScreen(this.targetPath[i].t, this.targetPath[i].y);
                ctx.lineTo(p.x, p.y);
            }
            ctx.stroke();
            
            ctx.fillStyle = this.showAnswer ? '#10b981' : '#4361ee';
            for(let p of this.targetPath) {
                let sp = this.toScreen(p.t, p.y);
                ctx.beginPath(); ctx.arc(sp.x, sp.y, this.showAnswer ? 7 : 5, 0, Math.PI*2); ctx.fill();
            }
        }

        // User Graph
        if (!this.readOnly || this.reviewMode) {
            for (let i=0; i<this.userSegments.length; i++) {
                let s = this.userSegments[i];
                let p1 = this.toScreen(s.t1, s.y1);
                let p2 = this.toScreen(s.t2, s.y2);
                
                ctx.strokeStyle = '#f8961e'; ctx.lineWidth = 4;
                ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y); ctx.stroke();
                
                ctx.fillStyle = '#f72585';
                ctx.beginPath(); ctx.arc(p1.x, p1.y, 6, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.arc(p2.x, p2.y, 6, 0, Math.PI*2); ctx.fill();
            }
        }
    }

    getUserSegments() { return this.userSegments; }
    
    showCorrectAnswer() { this.showAnswer = true; this.draw(); }
}

// --- APP CONTROLLER ---
const app = {
    mode: 'menu',
    currentTopic: null,
    currentData: null,
    canvasApps:[],
    practiceAttempts: 0,
    testQuestions:[],
    testName: "",
    buttonsLocked: false,

    hideAll() {['main-menu', 'practice-menu', 'test-login', 'workspace', 'test-results', 'practice-controls', 'test-controls'].forEach(id => {
            document.getElementById(id).classList.add('hidden');
        });
        document.getElementById('questions-container').innerHTML = '';
        this.canvasApps =[];
    },

    showMainMenu() { this.hideAll(); document.getElementById('main-menu').classList.remove('hidden'); },
    showPracticeMenu() { this.hideAll(); document.getElementById('practice-menu').classList.remove('hidden'); },
    showTestLogin() { this.hideAll(); document.getElementById('test-login').classList.remove('hidden'); },

    startPractice(topicId) {
        this.hideAll();
        this.mode = 'practice';
        this.currentTopic = topicId;
        this.practiceAttempts = 0;
        this.buttonsLocked = false;
        
        document.getElementById('workspace').classList.remove('hidden');
        document.getElementById('practice-controls').classList.remove('hidden');
        document.getElementById('btn-check').classList.remove('hidden');
        document.getElementById('btn-next').classList.add('hidden');
        document.getElementById('practice-feedback').classList.add('hidden');
        
        const titles =["Interpret Distance-Time", "Interpret Velocity-Time", "Create Distance-Time", "Create Velocity-Time"];
        document.getElementById('workspace-title').innerText = `Practice: ${titles[topicId-1]}`;
        
        let data = (topicId === 1 || topicId === 2) ? ContentGen.generateInterpret(topicId) : ContentGen.generateCreate(topicId);
        this.currentData = [data]; 
        
        this.renderQuestions(this.currentData, 'questions-container');
    },

    startTest() {
        let name = document.getElementById('student-name').value.trim();
        if(!name) return alert("Please enter your name!");
        this.testName = name;
        this.hideAll();
        this.mode = 'test';
        this.buttonsLocked = false;
        
        document.getElementById('workspace').classList.remove('hidden');
        document.getElementById('test-controls').classList.remove('hidden');
        document.getElementById('workspace-title').innerText = `Test Mode - Good Luck, ${name}!`;

        this.testQuestions =[
            ContentGen.generateInterpret(1),
            ContentGen.generateInterpret(2),
            ContentGen.generateCreate(3),
            ContentGen.generateCreate(4)
        ];

        this.renderQuestions(this.testQuestions, 'questions-container');
    },

    renderQuestions(questions, containerId) {
        const container = document.getElementById(containerId);
        container.innerHTML = '';
        this.canvasApps =[];

        questions.forEach((q, qIndex) => {
            let wrapper = document.createElement('div');
            wrapper.className = 'test-question-container';
            
            let contextHtml = '';
            if (q.type === 'interpret' && q.context) {
                contextHtml = `<div class="context-box">ℹ️ <strong>Context:</strong> ${q.context}</div>`;
            }

            wrapper.innerHTML = `<h3>Problem ${qIndex + 1}</h3>${contextHtml}<div class="question-layout" id="q-layout-${qIndex}"></div>`;
            container.appendChild(wrapper);

            let layout = document.getElementById(`q-layout-${qIndex}`);

            if (q.type === 'interpret') {
                let gPanel = document.createElement('div');
                gPanel.className = 'graph-panel card';
                gPanel.innerHTML = `<div id="canvas-container-${qIndex}"></div>`;
                layout.appendChild(gPanel);
                
                let cApp = new GraphCanvas(`canvas-container-${qIndex}`, q.isVel, true, q.path);
                this.canvasApps.push(cApp);

                let iPanel = document.createElement('div');
                iPanel.className = 'interactive-panel';
                q.statements.forEach((stmt, sIdx) => {
                    let optionsHtml = '';
                    if (stmt.type === 'TF') {
                        optionsHtml = `
                            <button class="toggle-btn" onclick="app.setToggle(${qIndex}, ${sIdx}, 0, this)">True</button>
                            <button class="toggle-btn" onclick="app.setToggle(${qIndex}, ${sIdx}, 1, this)">False</button>
                        `;
                    } else {
                        optionsHtml = stmt.options.map((opt, oIdx) => `
                            <button class="toggle-btn" onclick="app.setToggle(${qIndex}, ${sIdx}, ${oIdx}, this)">${opt}</button>
                        `).join('');
                    }

                    iPanel.innerHTML += `
                        <div class="statement-card">
                            <h4>${sIdx + 1}. ${stmt.text}</h4>
                            <div class="toggle-group" id="toggles-${qIndex}-${sIdx}">
                                ${optionsHtml}
                            </div>
                            <div class="explanation hidden" id="exp-${qIndex}-${sIdx}"></div>
                        </div>
                    `;
                });
                layout.appendChild(iPanel);

            } else {
                let sPanel = document.createElement('div');
                sPanel.className = 'interactive-panel';
                sPanel.innerHTML = `<div class="scenario-text">${q.scenario}</div>`;
                layout.appendChild(sPanel);

                let gPanel = document.createElement('div');
                gPanel.className = 'graph-panel card';
                gPanel.innerHTML = `
                    <div id="canvas-container-${qIndex}"></div>
                    <div class="toolbar" id="toolbar-${qIndex}">
                        <button class="btn" onclick="app.canvasApps[${qIndex}].addSegment()">➕ Add Segment</button>
                        <button class="btn btn-secondary" onclick="app.canvasApps[${qIndex}].removeSegment()">🗑️ Remove</button>
                    </div>
                `;
                layout.appendChild(gPanel);

                let cApp = new GraphCanvas(`canvas-container-${qIndex}`, q.isVel, false, q.path);
                this.canvasApps.push(cApp);
            }
        });
    },

    setToggle(qIdx, sIdx, val, btn) {
        if (this.buttonsLocked) return; 
        
        let parent = document.getElementById(`toggles-${qIdx}-${sIdx}`);
        let btns = parent.querySelectorAll('.toggle-btn');
        btns.forEach(b => b.classList.remove('selected-true', 'selected-false', 'selected-mcq'));
        
        if (btns.length === 2) { // True/False mode styling
            if (val === 0) btn.classList.add('selected-true');
            else btn.classList.add('selected-false');
        } else { // MCQ mode styling
            btn.classList.add('selected-mcq');
        }
        
        parent.dataset.val = val;
    },

    evaluateInterpret(qIdx, data) {
        let correctCount = 0;
        let details =[];
        data.statements.forEach((stmt, sIdx) => {
            let parent = document.getElementById(`toggles-${qIdx}-${sIdx}`);
            let userVal = parent && parent.dataset.val !== undefined ? parseInt(parent.dataset.val) : -1;
            
            let isCorrect = false;
            let cAns = '';
            let uAns = 'No answer';

            if (stmt.type === 'TF') {
                let correctIdx = stmt.isTrue ? 0 : 1;
                isCorrect = userVal === correctIdx;
                cAns = stmt.isTrue ? 'True' : 'False';
                if (userVal === 0) uAns = 'True';
                if (userVal === 1) uAns = 'False';
            } else {
                isCorrect = userVal === stmt.correctIndex;
                cAns = stmt.options[stmt.correctIndex];
                if (userVal >= 0 && userVal < stmt.options.length) {
                    uAns = stmt.options[userVal];
                }
            }

            if (isCorrect) correctCount++;
            details.push({ user: uAns, correct: cAns, isCorrect: isCorrect, exp: stmt.exp });
        });
        return { score: correctCount, max: 4, details };
    },

    evaluateCreate(qIdx, data) {
        let cApp = this.canvasApps[qIdx];
        let userSegs = cApp.getUserSegments();
        let correctCount = 0;

        let targetSegs =[];
        for(let i=0; i<data.path.length-1; i++) {
            targetSegs.push({ t1: data.path[i].t, y1: data.path[i].y, t2: data.path[i+1].t, y2: data.path[i+1].y });
        }

        let matchedTargets = new Set();
        userSegs.forEach(u => {
            for(let i=0; i<targetSegs.length; i++) {
                if (matchedTargets.has(i)) continue;
                let t = targetSegs[i];
                let matchForward = u.t1===t.t1 && u.y1===t.y1 && u.t2===t.t2 && u.y2===t.y2;
                let matchReverse = u.t1===t.t2 && u.y1===t.y2 && u.t2===t.t1 && u.y2===t.y1;
                if (matchForward || matchReverse) {
                    correctCount++;
                    matchedTargets.add(i);
                    break;
                }
            }
        });

        return { score: correctCount, max: 4, isPerfect: correctCount === 4 && userSegs.length === 4 };
    },

    lockInterface(topicIndex) {
        this.buttonsLocked = true;
        document.querySelectorAll('.toggle-btn').forEach(btn => btn.classList.add('locked'));
        if (this.canvasApps[topicIndex]) this.canvasApps[topicIndex].readOnly = true;
        let tb = document.getElementById(`toolbar-${topicIndex}`);
        if(tb) tb.classList.add('hidden');
    },

    checkPractice() {
        let data = this.currentData[0];
        let res = data.type === 'interpret' ? this.evaluateInterpret(0, data) : this.evaluateCreate(0, data);
        let fb = document.getElementById('practice-feedback');
        fb.classList.remove('hidden', 'success', 'error');

        let isPerfect = data.type === 'interpret' ? res.score === 4 : res.isPerfect;

        if (isPerfect) {
            this.lockInterface(0);
            fb.classList.add('success');
            fb.innerHTML = "🎉 Excellent! Everything is correct!";
            document.getElementById('btn-check').classList.add('hidden');
            document.getElementById('btn-next').classList.remove('hidden');
            
            if (data.type === 'interpret') {
                res.details.forEach((d, i) => {
                    let e = document.getElementById(`exp-0-${i}`);
                    e.classList.remove('hidden');
                    e.innerHTML = `<strong>✅ Correct!</strong> The answer is <strong>${d.correct}</strong>. ${d.exp}`;
                });
            } else {
                this.canvasApps[0].showCorrectAnswer();
            }
        } else {
            this.practiceAttempts++;
            fb.classList.add('error');
            
            if (this.practiceAttempts >= 2) {
                this.lockInterface(0);
                fb.innerHTML = `❌ Still incorrect. Let's review the correct answers.`;
                document.getElementById('btn-check').classList.add('hidden');
                document.getElementById('btn-next').classList.remove('hidden');
                
                if (data.type === 'interpret') {
                    res.details.forEach((d, i) => {
                        let e = document.getElementById(`exp-0-${i}`);
                        e.classList.remove('hidden');
                        let prefix = d.isCorrect ? "✅ Correct!" : "❌ Incorrect!";
                        e.innerHTML = `<strong>${prefix}</strong> The answer is <strong>${d.correct}</strong>. ${d.exp}`;
                    });
                } else {
                    this.canvasApps[0].showCorrectAnswer();
                }
            } else {
                let errCount = 4 - res.score;
                if (data.type === 'create' && this.canvasApps[0].getUserSegments().length !== 4) {
                    fb.innerHTML = `⚠️ You must draw exactly 4 segments to complete the graph. Try again!`;
                } else {
                    fb.innerHTML = `🤔 You have ${errCount} incorrect or missing item(s). Try again!`;
                }
            }
        }
    },

    submitTest() {
        if(!confirm("Are you sure you want to submit your test?")) return;

        let totalScore = 0;
        let summaryHTML = `<table><tr><th>Question</th><th>Topic</th><th>Your Score</th></tr>`;

            totalScore += res.score;

                savedSegs[i] = this.canvasApps[i].getUserSegments();
            }

                    Question ${i+1}: ${topics[i]} 
                    <span style="float: right; color: ${colorCode}; font-weight: 900;">Score: ${res.score}/4</span>
                </h4>
            `;

            if (q.type === 'interpret' && q.context) {
                detailedHTML += `<div class="context-box">ℹ️ <strong>Context:</strong> ${q.context}</div>`;
            }

            detailedHTML += `<div class="question-layout">`;

                detailedHTML += `
                    <div class="graph-panel">
                        <div id="review-canvas-${i}"></div>
                    </div>
                    <div class="interactive-panel">
                `;
                res.details.forEach((d, sIdx) => {
                    let uAns = d.user;
                    let cAns = d.correct;
                    let bColor = d.isCorrect ? '#10b981' : '#ef4444';
                    let bgColor = d.isCorrect ? '#ecfdf5' : '#fef2f2';
                    let prefix = d.isCorrect ? '✅ Correct!' : '❌ Incorrect!';
                    
                    detailedHTML += `
                        <div style="margin-bottom: 15px; padding: 15px; border-left: 5px solid ${bColor}; background: ${bgColor}; border-radius: 8px;">
                            <p style="margin-bottom: 8px;"><strong>${sIdx+1}. ${q.statements[sIdx].text}</strong></p>
                            <p style="margin-bottom: 5px;">Your Answer: <strong style="color: ${bColor};">${uAns}</strong></p>
                            <p style="font-size: 0.95rem; color: #475569;"><em><strong>${prefix}</strong> The correct answer is <strong>${cAns}</strong>. ${d.exp}</em></p>
                        </div>
                    `;
                });
                detailedHTML += `</div>`; 
            } else {
                detailedHTML += `
                    <div class="interactive-panel">
                        <div class="scenario-text" style="font-size: 1.1rem; margin-bottom:15px;">${q.scenario}</div>
                        <div style="background: #f8fafc; padding: 15px; border-radius: 10px; border: 1px solid #e2e8f0;">
                            <h5 style="margin-bottom: 10px; font-size: 1.1rem;">Performance Feedback:</h5>
                            <p>You drew <strong>${savedSegs[i].length}</strong> segments.</p>
                            <p>You perfectly matched <strong>${res.score} out of 4</strong> segments.</p>
                            ${res.score < 4 ? `<p style="color: #b91c1c; margin-top: 10px; font-size: 0.95rem;"><em>Compare your drawn line (orange) against the correct graph (thick green). You can see exactly where you missed the target!</em></p>` : `<p style="color: #059669; margin-top: 10px; font-weight:bold;"><em>Perfect Match! Great job!</em></p>`}
                        </div>
                    </div>
                    <div class="graph-panel">
                        <div id="review-canvas-${i}"></div>
                        <div style="margin-top: 15px; text-align: center; font-size: 1rem;">
                            <span style="display: inline-block; padding: 5px 10px; background: #ecfdf5; color: #065f46; border-radius: 5px; margin-right: 10px; font-weight: bold; border: 2px solid #10b981;">🟩 Correct Graph</span>
                            <span style="display: inline-block; padding: 5px 10px; background: #fff7ed; color: #9a3412; border-radius: 5px; font-weight: bold; border: 2px solid #f8961e;">🟧 Your Graph</span>
                        </div>
                    </div>
                `;
            }

            detailedHTML += `</div></div>`;
        });
        summaryHTML += `</table>`;

        this.hideAll();
        document.getElementById('test-results').classList.remove('hidden');
        document.getElementById('res-name').innerText = this.testName;
        document.getElementById('res-score').innerText = totalScore;
        document.getElementById('results-summary-container').innerHTML = summaryHTML;
        document.getElementById('results-detailed-container').innerHTML = detailedHTML;
        window.scrollTo(0,0);

        this.testQuestions.forEach((q, i) => {
            let cApp = new GraphCanvas(`review-canvas-${i}`, q.isVel, true, q.path);
            if (q.type === 'create') {
                cApp.setUserSegments(savedSegs[i]);
                cApp.reviewMode = true;
                cApp.showCorrectAnswer(); 
            }
        });
    }
};

app.showMainMenu();

</script>
</body>
</html>
